<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriCrypto — Connexion</title>
<link rel="stylesheet" href="css/theme.css">
<style>
  .auth-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .auth-card{width:100%; max-width:400px;}
  .auth-card .brand{justify-content:center; margin-bottom:28px;}
  .auth-card h1{font-size:22px; text-align:center; margin-bottom:6px;}
  .auth-card p.sub{text-align:center; color:var(--slate); font-size:14px; margin-bottom:28px;}
  .error{color:var(--danger); font-size:13px; margin-bottom:14px; display:none;}
  .switch-link{text-align:center; margin-top:20px; font-size:14px; color:var(--slate);}
  .switch-link a{color:var(--python); font-weight:600; text-decoration:none;}
</style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card card">
      <a href="index.html" class="brand">
        <div class="mark">A</div>
        <div class="name">AfriCrypto <span>Exchange</span></div>
      </a>
      <h1>Content de vous revoir</h1>
      <p class="sub">Connectez-vous pour accéder à votre portefeuille</p>

      <div class="error" id="errorBox"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="vous@exemple.com">
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
      </form>

      <div class="switch-link">Pas encore de compte ? <a href="register.html">Créer un compte</a></div>
    </div>
  </div>

<script src="js/api.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('errorBox');
    errorBox.style.display = 'none';
    try {
      const res = await api.login({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      if (res.requires2FA) {
        // TODO: rediriger vers un écran de saisie du code TOTP avec res.userId
        errorBox.textContent = 'Vérification 2FA requise (à implémenter côté UI).';
        errorBox.style.display = 'block';
        return;
      }
      localStorage.setItem('ac_token', res.token);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    }
  });
</script>
</body>
</html>
