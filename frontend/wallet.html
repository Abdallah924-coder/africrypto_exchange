<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriCrypto — Portefeuille</title>
<link rel="stylesheet" href="css/theme.css">
<style>
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  .qr-box{
    width:180px; height:180px; margin:0 auto 16px; background:#fff; border-radius:10px;
    display:flex; align-items:center; justify-content:center; color:#000; font-size:12px;
  }
  .address-box{
    display:flex; align-items:center; gap:8px; background:var(--carbon-2); border:1px solid var(--line);
    border-radius:var(--radius-sm); padding:12px 14px; font-family:'JetBrains Mono', monospace; font-size:13px;
    word-break:break-all;
  }
  .copy-btn{background:none; border:none; color:var(--python); cursor:pointer; font-size:12px; font-weight:600; flex-shrink:0;}
  .network-tag{display:inline-block; margin-top:10px; font-size:12px; color:var(--slate);}
  .fee-note{font-size:12px; color:var(--slate); margin-top:10px;}
  @media (max-width:680px){ .two-col{grid-template-columns:1fr;} }
</style>
</head>
<body>
  <header class="topbar">
    <a href="dashboard.html" class="brand">
      <div class="mark">A</div>
      <div class="name">AfriCrypto <span>Exchange</span></div>
    </a>
    <nav class="tabs">
      <a href="dashboard.html">Dashboard</a>
      <a href="wallet.html" class="active">Portefeuille</a>
      <a href="p2p.html">P2P</a>
    </nav>
    <div class="user-menu" data-user-menu>
      <div class="avatar">U</div>
      <button class="btn btn-ghost" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <main class="content">
    <h1 style="font-size:24px; margin-bottom:24px;">Portefeuille USDT</h1>

    <div class="two-col">
      <div class="card">
        <h2 style="font-size:15px; margin-bottom:16px;">Déposer</h2>
        <div class="qr-box" id="qrBox">QR code</div>
        <div class="address-box">
          <span id="depositAddress">Chargement…</span>
          <button class="copy-btn" onclick="copyAddress()">Copier</button>
        </div>
        <div class="network-tag" id="networkTag"></div>
        <p class="fee-note">N'envoyez que du USDT sur ce réseau. Les dépôts sont crédités automatiquement après confirmation.</p>
      </div>

      <div class="card">
        <h2 style="font-size:15px; margin-bottom:16px;">Retirer</h2>
        <div class="field">
          <label>Solde disponible</label>
          <div class="mono" id="availableBalance" style="font-size:18px; font-weight:700;">—</div>
        </div>
        <form id="withdrawForm">
          <div class="field">
            <label for="toAddress">Adresse de destination</label>
            <input type="text" id="toAddress" required placeholder="0x...">
          </div>
          <div class="field">
            <label for="amount">Montant (USDT)</label>
            <input type="number" id="amount" step="0.01" required placeholder="0.00">
          </div>
          <p class="fee-note" id="feeNote">Frais de retrait : 1%, minimum 1 USDT.</p>
          <button type="submit" class="btn btn-primary btn-block" style="margin-top:14px;">Retirer</button>
        </form>
        <div id="withdrawMsg" class="fee-note"></div>
      </div>
    </div>
  </main>

<script src="js/api.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/app.js"></script>
<script>
  async function loadWallet() {
    const wallet = await api.getWallet();
    document.getElementById('depositAddress').textContent = wallet.depositAddress;
    document.getElementById('networkTag').textContent = `Réseau : ${wallet.network}`;
    document.getElementById('availableBalance').textContent = `${wallet.available.toFixed(2)} USDT`;
  }
  function copyAddress() {
    navigator.clipboard.writeText(document.getElementById('depositAddress').textContent);
  }
  document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('withdrawMsg');
    try {
      const res = await api.withdraw({
        toAddress: document.getElementById('toAddress').value,
        amount: Number(document.getElementById('amount').value)
      });
      msg.style.color = 'var(--success)';
      msg.textContent = `Retrait initié : ${res.amount} USDT (frais : ${res.fee.toFixed(2)} USDT).`;
      loadWallet();
    } catch (err) {
      msg.style.color = 'var(--danger)';
      msg.textContent = err.message;
    }
  });
  loadWallet();
</script>
</body>
</html>
