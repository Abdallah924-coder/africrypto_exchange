<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriCrypto — Tableau de bord</title>
<link rel="stylesheet" href="css/theme.css">
<style>
  .grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; margin-bottom:28px;}
  .stat-card .label{font-size:13px; color:var(--slate); margin-bottom:8px;}
  .stat-card .value{font-family:'JetBrains Mono', monospace; font-size:26px; font-weight:700;}
  .stat-card .value.accent{color:var(--python);}
  .actions{display:flex; gap:12px; margin-bottom:32px;}
  table{width:100%; border-collapse:collapse;}
  th{text-align:left; font-size:12px; color:var(--slate); font-weight:600; padding:10px 12px; border-bottom:1px solid var(--line);}
  td{padding:14px 12px; border-bottom:1px solid var(--line-soft); font-size:14px;}
  tr:last-child td{border-bottom:none;}
  .empty{text-align:center; color:var(--slate); padding:40px 0; font-size:14px;}
  @media (max-width:680px){ .grid{grid-template-columns:1fr;} .actions{flex-direction:column;} }
</style>
</head>
<body>
  <div id="app-nav"></div>

  <main class="content">
    <h1 style="font-size:24px; margin-bottom:24px;">Vue d'ensemble</h1>

    <div class="grid">
      <div class="card stat-card">
        <div class="label">Solde disponible (USDT)</div>
        <div class="value" id="statAvailable">—</div>
      </div>
      <div class="card stat-card">
        <div class="label">Bloqué en escrow (USDT)</div>
        <div class="value accent" id="statLocked">—</div>
      </div>
      <div class="card stat-card">
        <div class="label">Réputation</div>
        <div class="value" id="statReputation">—</div>
      </div>
    </div>

    <div class="actions">
      <a href="wallet.html" class="btn btn-primary">Déposer / Retirer</a>
      <a href="p2p.html" class="btn btn-secondary">Acheter / Vendre du USDT</a>
    </div>

    <div class="card">
      <h2 style="font-size:16px; margin-bottom:16px;">Transactions récentes</h2>
      <div id="txTableWrap" class="empty">Chargement…</div>
    </div>
  </main>

<script src="js/api.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/nav.js"></script>
<script src="js/app.js"></script>
<script>
  async function loadDashboard() {
    try {
      const [wallet, user] = await Promise.all([api.getWallet(), api.me()]);
      document.getElementById('statAvailable').textContent = wallet.available.toFixed(2);
      document.getElementById('statLocked').textContent = wallet.locked.toFixed(2);
      document.getElementById('statReputation').textContent = `${user.reputation.positiveRate}%`;

      const transactions = await api.getMyTransactions();
      const wrap = document.getElementById('txTableWrap');
      if (!transactions.length) {
        wrap.innerHTML = '<div class="empty">Aucune transaction pour l\'instant. Rends-toi sur P2P pour acheter ou vendre.</div>';
        return;
      }
      const statusMap = { en_attente_paiement: ['pending', 'En attente'], paiement_declare: ['pending', 'Déclaré'], liberee: ['success', 'Terminée'], litige: ['danger', 'Litige'], remboursee: ['danger', 'Remboursée'] };
      wrap.innerHTML = `
        <table>
          <thead><tr><th>Date</th><th>Rôle</th><th>Montant</th><th>Statut</th></tr></thead>
          <tbody>
            ${transactions.slice(0, 5).map(tx => {
              const isSeller = String(tx.seller._id) === user.id;
              const [cls, label] = statusMap[tx.status] || ['pending', tx.status];
              return `<tr style="cursor:pointer;" onclick="location.href='p2p-transaction.html?id=${tx._id}'">
                <td class="muted">${new Date(tx.createdAt).toLocaleDateString('fr-FR')}</td>
                <td>${isSeller ? 'Vente' : 'Achat'}</td>
                <td class="mono">${tx.amountCrypto} USDT</td>
                <td><span class="status ${cls}">${label}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    } catch (err) {
      console.error(err);
    }
  }
  loadDashboard();
</script>
</body>
</html>
